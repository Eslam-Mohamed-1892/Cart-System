<!DOCTYPE html>
<html lang="en">
<style>
    body {
        background: #f5f5f5;
    }

    table {
        border-radius: 10px;
        overflow: hidden;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <!-- <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container py-4">

        <h1 class="text-center mb-4">Admin Page</h1>

        <!-- زرار -->
        <button class="btn btn-success mb-3 w-100 w-md-auto fw-semibold" data-bs-toggle="modal"
            data-bs-target="#addNewProduct">
            Add New Product
        </button>

        <!-- جدول -->
        <div class="table-responsive ">
            <table class="table table-dark table-bordered text-center table-sm shadow align-middle over">
                <thead>
                    <tr>
                        <th>seq</th>
                        <th>Item name</th>
                        <th>Item price</th>
                        <th>Image</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="addNewProduct" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Product</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p class="mb-0">Product name</p>
                        <input class="form-control mb-3 nameInput" placeholder="Enter the product name" type="text"
                            name="" id="">
                        <p class="mb-0">Product price</p>
                        <input class="form-control mb-3 priceInput" placeholder="Enter the product price" type="text"
                            name="" id="">
                        <p class="mb-0">Product brand</p>
                        <input class="form-control mb-3 brandInput" placeholder="Enter the product brand" type="text"
                            name="" id="">
                        <p class="mb-0">Product imgUrl</p>
                        <input class="form-control mb-3 imgUrlInput" placeholder="Enter the product imgUrl" type="text"
                            name="" id="">
                    </div>
                    <div class="modal-footer">
                        <button onclick="addNewProduct()" type="button" class="btn btn-primary">Add product</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Edit Product</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p class="mb-0">Product name</p>
                        <input class="form-control mb-3 editNameInput" placeholder="Enter the product name" type="text"
                            name="" id="">
                        <p class="mb-0">Product price</p>
                        <input class="form-control mb-3 editPriceInput" placeholder="Enter the product price"
                            type="text" name="" id="">
                        <p class="mb-0">Product brand</p>
                        <input class="form-control mb-3 editBrandInput" placeholder="Enter the product brand"
                            type="text" name="" id="">
                        <p class="mb-0">Product imgUrl</p>
                        <input class="form-control mb-3 editImgUrlInput" placeholder="Enter the product imgUrl"
                            type="text" name="" id="">
                    </div>
                    <div class="modal-footer">
                        <button onclick="saveChanges()" type="button" data-bs-dismiss="modal"
                            class="btn btn-primary">Save
                            changes</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
