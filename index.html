<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add To Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="col-12 d-flex flex-column flex-lg-row flex-md-row col-lg-12 p-md-3" style="height: 100vh;">
        <div class="col-8 bg-white border-0 h-100 p-4 overflow-auto shadow">
            <div class="mb-3">
                <button class="btn btn-dark" onclick="filterPorducts('Apple')">Apple products</button>
                <button class="btn btn-dark" onclick="filterPorducts('Samsung')">Samsung products</button>
                <button class="btn btn-dark" onclick="filterPorducts('Oppo')">Oppo products</button>
                <button class="btn btn-dark" onclick="filterPorducts('All')">Clear filter</button>
            </div>
            <div class="row g-3" id="productsDiv">
            </div>
        </div>
        <div class="col-4 h-100 p-4 overflow-auto">
            <h1 class="mb-3">Your cart</h1>
            <table class="table table-dark borderd" style="vertical-align: middle;">
                <thead class="text-center">
                    <tr>
                        <th>seq</th>
                        <th>Item name</th>
                        <th>Item price</th>
                        <th>Qty</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3">Total</td>
                        <td colspan="2"><span id="totalSpan">-----</span></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./data.js"></script>    
    <script src="./index.js"></script>
</body>

</html>
